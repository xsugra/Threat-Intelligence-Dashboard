<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Threat Intelligence Dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <text x="48" y="66" font-family="Arial, sans-serif" font-size="36" fill="#e5e7eb" font-weight="700">
    Threat Intelligence Dashboard
  </text>
  <text x="48" y="102" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af">
    Network connections geolocated and risk-scored on an interactive map
  </text>

  <rect x="42" y="134" width="1116" height="442" rx="14" fill="#0f172a" stroke="#1f2937" />

  <!-- stylized routes -->
  <line x1="520" y1="365" x2="785" y2="236" stroke="#22c55e" stroke-width="2" opacity="0.8" />
  <line x1="520" y1="365" x2="910" y2="328" stroke="#22c55e" stroke-width="2" opacity="0.8" />
  <line x1="520" y1="365" x2="688" y2="450" stroke="#ef4444" stroke-width="2" opacity="0.9" />
  <line x1="520" y1="365" x2="340" y2="252" stroke="#22c55e" stroke-width="2" opacity="0.8" />
  <line x1="520" y1="365" x2="264" y2="410" stroke="#22c55e" stroke-width="2" opacity="0.8" />

  <!-- local host marker -->
  <circle cx="520" cy="365" r="11" fill="#3b82f6" filter="url(#glow)" />
  <text x="538" y="370" font-family="Arial, sans-serif" font-size="14" fill="#bfdbfe">Your Machine</text>

  <!-- remote markers -->
  <circle cx="785" cy="236" r="8" fill="#22c55e" filter="url(#glow)" />
  <circle cx="910" cy="328" r="8" fill="#22c55e" filter="url(#glow)" />
  <circle cx="340" cy="252" r="8" fill="#22c55e" filter="url(#glow)" />
  <circle cx="264" cy="410" r="8" fill="#22c55e" filter="url(#glow)" />
  <circle cx="688" cy="450" r="8" fill="#ef4444" filter="url(#glow)" />

  <!-- legend -->
  <rect x="905" y="470" width="220" height="90" rx="10" fill="#111827" stroke="#374151" />
  <circle cx="930" cy="498" r="6" fill="#22c55e" />
  <text x="946" y="503" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">Low risk (score &lt;= 20)</text>
  <circle cx="930" cy="530" r="6" fill="#ef4444" />
  <text x="946" y="535" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db">High risk (score &gt; 20)</text>
</svg>

